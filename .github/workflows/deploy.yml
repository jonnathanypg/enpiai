name: Deploy to Alibaba Cloud ECS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install SSH key
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.ALI_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan ${{ secrets.ALI_HOST }} >> ~/.ssh/known_hosts

      - name: Create deployment archive
        run: |
          echo "📦 Creating deployment archive..."
          tar -czf /tmp/deploy.tar.gz \
            --exclude='node_modules' \
            --exclude='.next' \
            --exclude='venv' \
            --exclude='.venv' \
            --exclude='__pycache__' \
            --exclude='.git' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='*.pyc' \
            .
          echo "Archive size: $(du -h /tmp/deploy.tar.gz | cut -f1)"

      - name: Transfer archive to ECS
        run: |
          echo "🚀 Uploading archive to server..."
          scp -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa /tmp/deploy.tar.gz ${{ secrets.ALI_USER }}@${{ secrets.ALI_HOST }}:/tmp/deploy.tar.gz

      - name: Extract and deploy on server
        run: |
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ secrets.ALI_USER }}@${{ secrets.ALI_HOST }} "
            echo '📂 Extracting deployment archive...'
            mkdir -p ~/kindicoreai
            cd ~/kindicoreai
            tar -xzf /tmp/deploy.tar.gz --overwrite
            rm /tmp/deploy.tar.gz
            echo '⚙️ Running deployment script...'
            chmod +x deploy.sh
            ./deploy.sh
          "
