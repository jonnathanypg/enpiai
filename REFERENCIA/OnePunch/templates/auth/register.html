<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="OnePunch - Register">
    <title>Register - OnePunch</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">

    <style>
        .auth-layout {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--background) 0%, var(--surface) 100%);
            padding: var(--spacing-lg);
        }

        .auth-card {
            width: 100%;
            max-width: 480px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-xl);
            overflow: hidden;
        }

        .auth-header {
            padding: var(--spacing-xl);
            text-align: center;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .auth-logo {
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-sm);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: var(--spacing-sm);
        }

        .auth-logo .logo-icon {
            width: 48px;
            height: 48px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }

        .auth-body {
            padding: var(--spacing-xl);
        }

        .auth-footer {
            padding: var(--spacing-lg) var(--spacing-xl);
            text-align: center;
            background: var(--surface-hover);
            border-top: 1px solid var(--border);
        }

        .error-message {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: var(--spacing-sm) var(--spacing-md);
            border-radius: var(--radius);
            margin-bottom: var(--spacing-lg);
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-md);
        }
    </style>
</head>

<body>
    <div class="auth-layout">
        <div class="auth-card">
            <div class="auth-header">
                <div class="auth-logo">
                    <div class="logo-icon">OP</div>
                    <span>OnePunch</span>
                </div>
                <p style="opacity: 0.9;">Create your multi-agent system</p>
            </div>

            <div class="auth-body">
                <h2 style="margin-bottom: var(--spacing-lg);">Create Account</h2>

                <div class="error-message" id="errorMessage"></div>

                <form id="registerForm" onsubmit="handleRegister(event)">
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">Your Name</label>
                            <input type="text" class="form-input" id="name" placeholder="John Doe" required>
                        </div>

                        <div class="form-group">
                            <label class="form-label">Company Name</label>
                            <input type="text" class="form-input" id="companyName" placeholder="Acme Inc" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Email Address</label>
                        <input type="email" class="form-input" id="email" placeholder="you@company.com" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">Password</label>
                        <input type="password" class="form-input" id="password" placeholder="••••••••" required
                            minlength="8">
                    </div>

                    <div class="form-group">
                        <label class="form-label">Agent Name (Optional)</label>
                        <input type="text" class="form-input" id="agentName" placeholder="e.g., Alex, Luna, Max">
                        <small style="color: var(--text-muted);">This is how your AI assistant will introduce
                            itself</small>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg w-full" id="submitBtn">
                        Create Account
                    </button>
                </form>
            </div>

            <div class="auth-footer">
                <p>Already have an account? <a href="/login">Sign in</a></p>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        async function handleRegister(event) {
            event.preventDefault();

            const name = document.getElementById('name').value;
            const companyName = document.getElementById('companyName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const agentName = document.getElementById('agentName').value;
            const submitBtn = document.getElementById('submitBtn');
            const errorMessage = document.getElementById('errorMessage');

            submitBtn.disabled = true;
            submitBtn.textContent = 'Creating account...';
            errorMessage.classList.remove('visible');

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        name,
                        company_name: companyName,
                        email,
                        password,
                        agent_name: agentName || 'Assistant'
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    // Store token
                    localStorage.setItem('token', data.access_token);
                    localStorage.setItem('refresh_token', data.refresh_token);

                    // Redirect to dashboard
                    window.location.href = '/dashboard';
                } else {
                    errorMessage.textContent = data.error || 'Registration failed';
                    errorMessage.classList.add('visible');
                }
            } catch (e) {
                errorMessage.textContent = 'An error occurred. Please try again.';
                errorMessage.classList.add('visible');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Create Account';
            }
        }

        // Check if already logged in with valid token
        async function checkExistingAuth() {
            const token = localStorage.getItem('token');
            if (token) {
                try {
                    const response = await fetch('/api/auth/me', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    if (response.ok) {
                        window.location.href = '/dashboard';
                    } else {
                        // Token invalid, clear it
                        localStorage.removeItem('token');
                        localStorage.removeItem('refresh_token');
                    }
                } catch (e) {
                    localStorage.removeItem('token');
                    localStorage.removeItem('refresh_token');
                }
            }
        }
        checkExistingAuth();
    </script>
</body>

</html>
