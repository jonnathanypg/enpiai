<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - {{ company_name }}</title>
    <style>
        :root {
            --primary-color: #10b981;
            /* Default Success Green */
            --text-color: #1f2937;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            max-width: 450px;
            width: 100%;
            padding: 40px;
            text-align: center;
            animation: fadeIn 0.6s ease-out;
        }

        .icon-container {
            width: 80px;
            height: 80px;
            background-color: #d1fae5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
        }

        .success-icon {
            color: var(--primary-color);
            width: 40px;
            height: 40px;
        }

        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            font-weight: 700;
        }

        p.subtitle {
            color: #6b7280;
            font-size: 16px;
            margin-bottom: 32px;
        }

        .details-box {
            background-color: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 32px;
            text-align: left;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .detail-row:last-child {
            margin-bottom: 0;
            padding-top: 12px;
            border-top: 1px dashed #e5e7eb;
            font-weight: 600;
            font-size: 16px;
        }

        .detail-label {
            color: #6b7280;
        }

        .detail-value {
            color: #111827;
            font-weight: 500;
        }

        .btn {
            display: inline-block;
            background-color: #000;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 500;
            transition: transform 0.1s ease;
            cursor: pointer;
            border: none;
        }

        .btn:hover {
            transform: translateY(-1px);
            opacity: 0.9;
        }

        .footer {
            margin-top: 24px;
            font-size: 12px;
            color: #9ca3af;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <div class="icon-container">
            <svg class="success-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>

        <h1>Payment Successful!</h1>
        <p class="subtitle">Your transaction has been confirmed.</p>

        <div class="details-box">
            <div class="detail-row">
                <span class="detail-label">Order ID</span>
                <span class="detail-value">{{ order_id }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Customer</span>
                <span class="detail-value">{{ customer_name }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Service</span>
                <span class="detail-value">{{ description }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Merchant</span>
                <span class="detail-value">{{ company_name }}</span>
            </div>
            <div class="detail-row">
                <span class="detail-label">Total Amount</span>
                <span class="detail-value">{{ amount }} {{ currency }}</span>
            </div>
        </div>

        <p class="footer">A receipt has been sent to your email.</p>

        <button onclick="window.close()" class="btn">Close Window</button>
    </div>

</body>

</html>
